<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>找角度游戏</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0a0a12; color: #f0f0f5;
      touch-action: none;
    }
    #game-canvas {
      display: block; width: 100%; height: 100%;
      touch-action: none;
    }
    #hud {
      position: fixed; inset: 0; pointer-events: none;
      display: flex; flex-direction: column;
    }
    .hud-top {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; pointer-events: auto;
    }
    .hud-center {
      flex: 1; display: flex; align-items: flex-start; justify-content: center;
      padding-top: 8px;
    }
    .hud-bottom {
      padding: 12px 16px 20px; pointer-events: auto;
    }
    .badge {
      background: rgba(20, 20, 35, 0.85);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 8px 14px;
      font-size: 14px; backdrop-filter: blur(8px);
    }
    #timer { font-variant-numeric: tabular-nums; font-weight: 600; }
    #title-badge { font-size: 13px; opacity: 0.85; }
    #clarity-label {
      font-size: 12px; opacity: 0.7; margin-bottom: 6px; text-align: center;
    }
    #clarity-bar-wrap {
      height: 10px; background: rgba(255,255,255,0.1);
      border-radius: 5px; overflow: hidden; position: relative;
    }
    #clarity-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #4a6cf7, #7ee8fa);
      border-radius: 5px; transition: width 0.12s ease-out;
    }
    #clarity-threshold {
      position: absolute; top: -2px; bottom: -2px; width: 2px;
      background: rgba(255, 220, 100, 0.9);
    }
    #clarity-value {
      text-align: center; font-size: 11px; opacity: 0.6; margin-top: 4px;
    }
    #hint-text {
      text-align: center; font-size: 13px; opacity: 0.75;
      margin-bottom: 10px; min-height: 18px;
    }
    #guess-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .guess-btn {
      pointer-events: auto; cursor: pointer;
      background: rgba(30, 30, 50, 0.9);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; padding: 14px 8px;
      color: #f0f0f5; font-size: 15px;
      transition: background 0.15s, transform 0.1s;
    }
    .guess-btn:active { transform: scale(0.97); }
    .guess-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .guess-btn.correct { background: rgba(40, 160, 80, 0.85); border-color: #5ddf8a; }
    .guess-btn.wrong { background: rgba(180, 50, 50, 0.85); border-color: #ff6b6b; }
    #action-row {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .action-btn {
      flex: 1; pointer-events: auto; cursor: pointer;
      background: rgba(50, 50, 80, 0.85);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 10px;
      color: #ddd; font-size: 13px;
    }
    .action-btn.primary {
      background: rgba(74, 108, 247, 0.75); color: #fff;
      border-color: rgba(126, 232, 250, 0.4);
    }
    #overlay {
      position: fixed; inset: 0; display: none;
      background: rgba(5, 5, 15, 0.82);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      pointer-events: auto; z-index: 100;
    }
    #overlay.visible { display: flex; }
    #overlay h2 { font-size: 28px; }
    #overlay p { opacity: 0.8; font-size: 15px; max-width: 280px; text-align: center; line-height: 1.5; }
    #overlay button {
      margin-top: 8px; padding: 12px 32px; font-size: 16px;
      background: #4a6cf7; color: #fff; border: none;
      border-radius: 12px; cursor: pointer;
    }
    #loading {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: #0a0a12; z-index: 200; font-size: 16px;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">加载中…</div>
  <canvas id="game-canvas"></canvas>
  <div id="hud">
    <div class="hud-top">
      <button class="badge action-btn" id="btn-reset" type="button">↺ 重开</button>
      <span class="badge" id="title-badge">找角度游戏</span>
      <span class="badge" id="timer">01:00</span>
    </div>
    <div class="hud-center">
      <span class="badge" id="wrong-count">错误 0/3</span>
    </div>
    <div class="hud-bottom">
      <div id="clarity-label">清晰度 — 拖动旋转找最佳角度</div>
      <div id="clarity-bar-wrap">
        <div id="clarity-bar"></div>
        <div id="clarity-threshold"></div>
      </div>
      <div id="clarity-value">0%</div>
      <div id="hint-text">单指/鼠标拖拽环绕观察</div>
      <div id="guess-panel"></div>
      <div id="action-row">
        <button class="action-btn" id="btn-hint" type="button">💡 提示</button>
        <button class="action-btn primary" id="btn-confirm" type="button">我认出来了！</button>
      </div>
    </div>
  </div>
  <div id="overlay">
    <h2 id="overlay-title">胜利！</h2>
    <p id="overlay-msg"></p>
    <button id="overlay-restart" type="button">再玩一次</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
